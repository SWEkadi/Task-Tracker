{% extends 'tasks/base.html' %}

{% block content %}
<h1>Edit Task</h1>

<form method="post" class="form-box">
    {% csrf_token %}

    <label>Title</label>
    <input type="text" name="title" value="{{ title|default:task.title }}" required>

    <label>Description</label>
    <textarea name="description" rows="4">{{ description|default:task.description }}</textarea>

    <label>Due Date</label>
    <input type="date" name="due_date" value="{% if due_date %}{{ due_date }}{% else %}{{ task.due_date|date:'Y-m-d' }}{% endif %}">

    <label>Priority</label>
    <select name="priority" required>
        {% for value, label in priority_choices %}
            <option value="{{ value }}" {% if priority == value or not priority and task.priority == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>

    <button type="submit" class="btn btn-full">
        Save Changes
    </button>
</form>

<p>
    <a href="{% url 'task_list' %}">Back to tasks</a>
</p>
{% endblock %}
