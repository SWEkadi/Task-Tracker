{% extends 'tasks/base.html' %}

{% block content %}
<h1>Edit Task</h1>

<form method="post" class="form-box">
    {% csrf_token %}

    <label>Title</label>
    <input type="text" name="title" value="{{ task.title }}" placeholder="Enter task title">

    <label>Description</label>
    <textarea name="description" rows="4" placeholder="Enter task description">{{ task.description }}</textarea>

    <button type="submit" class="btn btn-full">Save Changes</button>
</form>

<p>
    <a href="{% url 'task_list' %}">Back to tasks</a>
</p>
{% endblock %}
