<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>
    <style>
        :root {
            --page-bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --secondary-hover: #475569;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --soft-bg: #f1f5f9;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--page-bg);
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 14px;
            max-width: 550px;
            margin: 70px auto;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border);
        }

        .wide-container {
            max-width: 850px;
        }

        h1 {
            margin-top: 0;
            color: var(--text-main);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .welcome {
            font-weight: bold;
            color: var(--text-muted);
        }

        .btn {
            display: inline-block;
            padding: 12px 16px;
            text-decoration: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 15px;
            text-align: center;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-full {
            width: 100%;
            margin-top: 12px;
        }

        .btn-danger {
            background-color: var(--danger);
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .btn-secondary {
            background-color: var(--secondary);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        .task-card {
            border: 1px solid var(--border);
            padding: 18px;
            margin-bottom: 14px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
        }

        .task-card h3 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .task-card p {
            color: var(--text-muted);
        }

        .status {
            font-weight: bold;
            color: var(--text-main);
        }

        .status-todo {
            color: #2563eb;
            background-color: #dbeafe;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .status-progress {
            color: #92400e;
            background-color: #fef3c7;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .status-done {
            color: #166534;
            background-color: #dcfce7;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .priority {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        .priority-high {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background-color: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background-color: #dcfce7;
            color: #166534;
        }

        .priority {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        .priority-high {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background-color: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background-color: #dcfce7;
            color: #166534;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .form-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-box input,
        .form-box textarea,
        .form-box select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background-color: #ffffff;
            color: var(--text-main);
        }

        .form-box input:focus,
        .form-box textarea:focus,
        .form-box select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-box label {
            font-weight: bold;
            margin-top: 8px;
            color: var(--text-main);
        }

        .form-box small {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .error-box {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid #fecaca;
        }

        .message {
            background-color: var(--success-bg);
            color: var(--success-text);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid #bbf7d0;
        }

        .dashboard {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .dashboard-card {
            flex: 1;
            background-color: var(--soft-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .dashboard-card h3 {
            margin: 0 0 10px;
            color: var(--text-muted);
        }

        .dashboard-card p {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            color: var(--primary);
        }

        a {
            color: var(--primary);
            font-weight: bold;
        }

        a:hover {
            color: var(--primary-hover);
        }

        p {
            color: var(--text-muted);
        }

        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container {% if user.is_authenticated %}wide-container{% endif %}">

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-box{% else %}message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
